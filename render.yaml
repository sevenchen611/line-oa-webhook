databases:
  # 訊息持久化佇列（2026-06-13 轉付費：解除免費版 30 天到期風險，
  # 並把帳戶唯一的免費 Postgres 名額讓給 HOZO 測試用）。
  - name: sevenam-queue-db
    plan: basic-256mb
    databaseName: sevenam_queue
    user: sevenam

services:
  - type: web
    name: line-oa-webhook
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINE_CHANNEL_ID
        value: "2010309343"
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: SEVEN_CONVERSATIONS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_MESSAGES_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_ATTACHMENTS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_CODEX_COMMANDS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_DATA_SOURCE_PARENT_BLOCK_ID
        sync: false
      - key: SEVEN_ATTACHMENT_CONVERSIONS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_MEETINGS_DATA_SOURCE_ID
        value: fd551c68-6dac-830d-81bf-879f0a9582ba
      - key: SEVEN_TASKS_DATA_SOURCE_ID
        value: 0bdc0de5-46ee-482c-b8d7-cdf6ec958467
      - key: SEVEN_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: fc5e4e21-6af6-4de2-9380-aa95126ee13e
      - key: SEVEN_DAILY_REPORT_SNAPSHOTS_DATA_SOURCE_ID
        value: 8f7f95a5-7428-4490-9327-7943499a0e22
      - key: SEVEN_RESPONSIBILITY_DATA_SOURCE_ID
        value: e8c2f582-edbe-42ab-9d7f-ba063bbf8b99
      - key: SEVEN_LINE_GROUP_OPTIONS_DATA_SOURCE_ID
        value: b6cfffbf-e7b2-4da4-b21d-d055bc68af69
      - key: SEVEN_LINE_GROUP_MEMBERS_DATA_SOURCE_ID
        value: 979949aa-bac3-45ac-a4cc-a38585addb89
      - key: SEVEN_LINE_GROUP_MEMBER_INDEX_DATA_SOURCE_ID
        value: d429187b-46b8-4e22-b79e-ed54c44fea04
      - key: SEVEN_JUDGMENT_CALIBRATION_CASES_DATA_SOURCE_ID
        value: 9714e599-5677-4071-afe4-3e577e1c412e
      - key: SEVEN_JUDGMENT_RULES_DATA_SOURCE_ID
        value: 5dc0f7d1-7776-4724-8104-6b3e131dd972
      - key: SEVEN_JUDGMENT_REVIEW_TARGET_NAME_KEYWORD
        value: "Seven 陳聖文"
      - key: SEVEN_CONTROL_API_KEY
        sync: false
      - key: SEVEN_USER_UI_USERNAME
        sync: false
      - key: SEVEN_USER_UI_PASSWORD
        sync: false
      - key: SEVEN_REPORT_TARGET_IDS
        sync: false
      - key: SEVEN_REPORT_CC_TARGET_IDS
        sync: false
      - key: SEVEN_REPORT_CC_NAME_KEYWORDS
        sync: false
      - key: SEVEN_ALERT_TARGET_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sevenam-queue-db
          property: connectionString

  - type: cron
    name: seven-jr-line-message-judgement-sync
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node scripts/run-cron-with-alert.js -- node scripts/llm-task-extraction.js --include-outgoing-groups --limit 20
    schedule: "10 0-14 * * *"
    envVars:
      - key: AM_SKIP_IF_WORKER_ACTIVE
        value: "true"
      - key: AM_WORKER_STATUS_URL
        value: https://line-oa-webhook-nn5j.onrender.com/worker/status
      - key: CRON_JOB_NAME
        value: seven-jr-line-message-judgement-sync
      - key: ANTHROPIC_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: ANTHROPIC_API_KEY
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: AM_PROJECT_ENV_PREFIX
        value: SEVEN
      - key: AM_CONTROL_HEADER_PREFIX
        value: seven
      - key: AM_OUTGOING_ACTOR_NAME
        value: "Seven Jr."
      - key: AM_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY
      - key: NOTION_TOKEN
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: NOTION_TOKEN
      - key: SEVEN_CONVERSATIONS_DATA_SOURCE_ID
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONVERSATIONS_DATA_SOURCE_ID
      - key: SEVEN_TASKS_DATA_SOURCE_ID
        value: 0bdc0de5-46ee-482c-b8d7-cdf6ec958467
      - key: SEVEN_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: fc5e4e21-6af6-4de2-9380-aa95126ee13e

  - type: cron
    name: seven-jr-codex-command-triage
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node scripts/run-cron-with-alert.js -- node scripts/llm-codex-command-triage.js --limit 10
    # 工作時段台北 07:00-23:00（UTC 23:00-15:00）；夜間不執行。
    schedule: "*/15 0-14,23 * * *"
    envVars:
      - key: AM_SKIP_IF_WORKER_ACTIVE
        value: "true"
      - key: AM_WORKER_STATUS_URL
        value: https://line-oa-webhook-nn5j.onrender.com/worker/status
      - key: CRON_JOB_NAME
        value: seven-jr-codex-command-triage
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: AM_PROJECT_ENV_PREFIX
        value: SEVEN
      - key: AM_CONTROL_HEADER_PREFIX
        value: seven
      - key: AM_OUTGOING_ACTOR_NAME
        value: "Seven Jr."
      - key: AM_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY
      - key: ANTHROPIC_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: ANTHROPIC_API_KEY
      - key: NOTION_TOKEN
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: NOTION_TOKEN
      - key: SEVEN_CODEX_COMMANDS_DATA_SOURCE_ID
        value: c4eee8de-e596-4d64-906b-1405d79e721c

  - type: cron
    name: seven-jr-attachment-parsing
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node scripts/run-cron-with-alert.js -- node scripts/parse-attachments.js --limit 8
    # 工作時段台北 07:00-23:00（UTC 23:00-15:00）；夜間不執行。
    schedule: "7,22,37,52 0-14,23 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: seven-jr-attachment-parsing
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: AM_PROJECT_ENV_PREFIX
        value: SEVEN
      - key: AM_CONTROL_HEADER_PREFIX
        value: seven
      - key: AM_OUTGOING_ACTOR_NAME
        value: "Seven Jr."
      - key: AM_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY
      - key: ANTHROPIC_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: ANTHROPIC_API_KEY
      - key: NOTION_TOKEN
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: NOTION_TOKEN
      - key: SEVEN_ATTACHMENTS_DATA_SOURCE_ID
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_ATTACHMENTS_DATA_SOURCE_ID
