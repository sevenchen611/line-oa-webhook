services:
  - type: web
    name: line-oa-webhook
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINE_CHANNEL_ID
        value: "2010309343"
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: SEVEN_CONVERSATIONS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_MESSAGES_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_ATTACHMENTS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_CODEX_COMMANDS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_ATTACHMENT_CONVERSIONS_DATA_SOURCE_ID
        sync: false
      - key: SEVEN_MEETINGS_DATA_SOURCE_ID
        value: fd551c68-6dac-830d-81bf-879f0a9582ba
      - key: SEVEN_TASKS_DATA_SOURCE_ID
        value: 0bdc0de5-46ee-482c-b8d7-cdf6ec958467
      - key: SEVEN_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: fc5e4e21-6af6-4de2-9380-aa95126ee13e
      - key: SEVEN_DAILY_REPORT_SNAPSHOTS_DATA_SOURCE_ID
        value: 8f7f95a5-7428-4490-9327-7943499a0e22
      - key: SEVEN_CONTROL_API_KEY
        sync: false

  - type: cron
    name: seven-jr-line-message-judgement-sync
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run line:judgements -- --limit 50
    schedule: "10 0-14 * * *"
    envVars:
      - key: NOTION_TOKEN
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: NOTION_TOKEN
      - key: SEVEN_MESSAGES_DATA_SOURCE_ID
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_MESSAGES_DATA_SOURCE_ID
      - key: SEVEN_TASKS_DATA_SOURCE_ID
        value: 0bdc0de5-46ee-482c-b8d7-cdf6ec958467
      - key: SEVEN_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: fc5e4e21-6af6-4de2-9380-aa95126ee13e

  - type: cron
    name: seven-jr-meeting-action-sync
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run meetings:sync -- --limit 50
    schedule: "0 0-14 * * *"
    envVars:
      - key: NOTION_TOKEN
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: NOTION_TOKEN
      - key: SEVEN_MEETINGS_DATA_SOURCE_ID
        value: fd551c68-6dac-830d-81bf-879f0a9582ba
      - key: SEVEN_TASKS_DATA_SOURCE_ID
        value: 0bdc0de5-46ee-482c-b8d7-cdf6ec958467
      - key: SEVEN_PROGRESS_REPORTS_DATA_SOURCE_ID
        value: fc5e4e21-6af6-4de2-9380-aa95126ee13e

  - type: cron
    name: seven-jr-morning-brief
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- morning
    schedule: "0 0 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: seven-jr-morning-brief
      - key: CONTROL_API_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: SEVEN_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY

  - type: cron
    name: seven-jr-followup-morning
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- followup-morning
    schedule: "0 2 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: seven-jr-followup-morning
      - key: CONTROL_API_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: SEVEN_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY

  - type: cron
    name: seven-jr-followup-midday
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- followup-midday
    schedule: "0 5 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: seven-jr-followup-midday
      - key: CONTROL_API_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: SEVEN_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY

  - type: cron
    name: seven-jr-followup-afternoon
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- followup-afternoon
    schedule: "0 9 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: seven-jr-followup-afternoon
      - key: CONTROL_API_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: SEVEN_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY

  - type: cron
    name: seven-jr-daily-report
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run cron:report -- daily
    schedule: "30 12 * * *"
    envVars:
      - key: CRON_JOB_NAME
        value: seven-jr-daily-report
      - key: CONTROL_API_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/reports/send
      - key: CONTROL_LINE_PUSH_URL
        value: https://line-oa-webhook-nn5j.onrender.com/control/line/push
      - key: SEVEN_CRON_ALERTS_ENABLED
        value: "true"
      - key: SEVEN_CONTROL_API_KEY
        fromService:
          name: line-oa-webhook
          type: web
          envVarKey: SEVEN_CONTROL_API_KEY
